<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_title }} - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v=20260405a" />
  <style>
    :root, [data-theme] {
      --surface: var(--bg-card);
      --surface-2: var(--bg-hover);
      --text-dim: var(--text-muted);
      --accent: var(--primary);
      --accent-hover: var(--primary-hover);
      --green: var(--success);
      --yellow: var(--warning);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; border-radius: 8px; }
    .nav { display: flex; gap: 24px; align-items: center; }
    .nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav a:hover, .nav a.active { color: var(--text); }
    .main {
      padding: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page-subtitle {
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface-2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Server Cards */
    .server-grid {
      display: grid;
      gap: 12px;
    }
    .server-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface-2);
      border-radius: 10px;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .server-card:hover { border-color: var(--border); }
    .server-card.is-default { border-color: var(--yellow); }
    .server-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .server-info { flex: 1; min-width: 0; }
    .server-name {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .server-name .default-star { color: var(--yellow); font-size: 12px; }
    .server-url {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .server-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--bg);
      color: var(--text-dim);
    }
    .server-status.connected { background: rgba(70, 211, 105, 0.15); color: var(--green); }
    .server-status.error { background: rgba(229, 9, 20, 0.15); color: var(--accent); }
    .server-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state p { margin-bottom: 16px; }

    /* Integration List */
    .integration-list { display: grid; gap: 12px; }
    .integration-item {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface-2);
      border-radius: 10px;
    }
    .integration-label {
      font-weight: 500;
      font-size: 14px;
    }
    .integration-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .integration-fields input {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }
    .integration-fields input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .integration-fields input::placeholder { color: var(--text-dim); }
    .integration-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--bg);
      color: var(--text-dim);
    }
    .integration-status.ok { background: rgba(70, 211, 105, 0.15); color: var(--green); }
    .integration-status.err { background: rgba(229, 9, 20, 0.15); color: var(--accent); }

    /* AI provider toggle */
    .ai-provider-toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: var(--surface-2);
      border-radius: 10px;
      flex-wrap: wrap;
    }
    .ai-provider-toggle-label {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }
    .segmented-control {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .seg-btn {
      padding: 6px 14px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active {
      background: var(--accent, #6366f1);
      color: #fff;
      font-weight: 600;
    }
    .ai-provider-toggle-hint {
      font-size: 12px;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* AI Section */
    .ai-section {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    .ai-provider {
      padding: 16px;
      background: var(--surface-2);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .ai-provider:last-child { margin-bottom: 0; }
    .ai-provider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .ai-provider-name {
      font-weight: 600;
      font-size: 14px;
    }
    .ai-provider-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ai-provider-fields input,
    .ai-provider-fields select {
      flex: 1;
      min-width: 160px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }
    .model-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .model-chip {
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .model-chip:hover { border-color: var(--text-dim); }
    .model-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Seen Movies */
    .seen-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .seen-controls input { flex: 1; }
    .seen-list {
      max-height: 350px;
      overflow-y: auto;
    }
    .seen-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface-2);
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .seen-item-title { font-weight: 500; font-size: 14px; }
    .seen-item-meta { font-size: 12px; color: var(--text-dim); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .form-actions .btn { flex: 1; }

    .feedback {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 16px;
    }
    .feedback.success { background: rgba(70, 211, 105, 0.15); color: var(--green); }
    .feedback.error { background: rgba(229, 9, 20, 0.15); color: var(--accent); }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
      .integration-item { grid-template-columns: 1fr; gap: 10px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">
      <img src="/static/logo.svg" alt="" />
      <span>{{ app_title }}</span>
    </a>
    <nav class="nav">
      <a href="/">Movies</a>
      <a href="/chat">AI Chat</a>
      <a href="/integrations" class="active">Settings</a>
      <select id="theme-select" class="form-input" style="width:auto;padding:6px 10px;">
        <option value="dark">Dark</option>
        <option value="midnight">Midnight</option>
        <option value="ocean">Ocean</option>
        <option value="forest">Forest</option>
        <option value="light">Light</option>
      </select>
    </nav>
  </header>

  <main class="main">
    <h1 class="page-title">Settings</h1>
    <p class="page-subtitle">Configure your media servers and integrations</p>

    <!-- Media Servers -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Media Servers</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="openModal('plex')">+ Plex</button>
          <button class="btn btn-secondary btn-sm" onclick="openModal('radarr')">+ Radarr</button>
        </div>
      </div>
      <div class="server-grid" id="servers-list">
        <div class="empty-state">
          <p>No servers configured</p>
          <button class="btn btn-primary btn-sm" onclick="openModal('plex')">Add Plex Server</button>
        </div>
      </div>
    </div>

    <!-- AI Providers -->
    <div class="card ai-section">
      <div class="card-header">
        <span class="card-title">AI Providers</span>
        <button class="btn btn-primary btn-sm" id="save-ai">Save</button>
      </div>

      <div class="ai-provider-toggle-row">
        <span class="ai-provider-toggle-label">Active Provider</span>
        <div class="segmented-control" id="llm-provider-toggle">
          <button type="button" class="seg-btn" data-value="auto">Auto</button>
          <button type="button" class="seg-btn" data-value="groq">Groq Cloud</button>
          <button type="button" class="seg-btn" data-value="ollama">Local (Ollama)</button>
        </div>
        <span class="ai-provider-toggle-hint" id="llm-provider-hint"></span>
      </div>

      <div class="ai-provider">
        <div class="ai-provider-header">
          <span class="ai-provider-name">Groq Cloud</span>
          <span class="integration-status" id="groq-status">Not configured</span>
        </div>
        <div class="ai-provider-fields">
          <input type="password" id="groq_api_key" placeholder="API Key from console.groq.com">
          <select id="groq_model">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
            <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
          </select>
        </div>
        <div class="model-chips" id="groq-chips"></div>
      </div>

      <div class="ai-provider">
        <div class="ai-provider-header">
          <span class="ai-provider-name">Ollama (Local)</span>
          <span class="integration-status" id="ollama-status">Not configured</span>
        </div>
        <div class="ai-provider-fields">
          <input type="text" id="ollama_base_url" placeholder="http://localhost:11434">
          <select id="ollama_model">
            <option value="">Select model...</option>
          </select>
          <button class="btn btn-secondary btn-sm btn-icon" onclick="refreshOllamaModels()" title="Refresh">↻</button>
        </div>
      </div>
    </div>

    <!-- Data Sources -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Data Sources</span>
        <button class="btn btn-primary btn-sm" id="save-integrations">Save All</button>
      </div>
      <div class="integration-list" id="integration-list"></div>
      <div id="integration-feedback"></div>
    </div>

    <!-- Seen Movies -->
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Seen Movies</span>
          <button class="btn btn-secondary btn-sm" id="import-plex">Import from Plex</button>
        </div>
        <div class="seen-controls">
          <input type="text" class="form-input" id="seen-search" placeholder="Search...">
        </div>
        <div class="seen-list" id="seen-list">
          <div class="empty-state"><p>No movies tracked yet</p></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Add Movie</span>
        </div>
        <form id="add-movie-form">
          <div class="form-group">
            <input type="text" class="form-input" id="movie-title" placeholder="Movie title" required>
          </div>
          <div class="form-group">
            <input type="number" class="form-input" id="movie-year" placeholder="Year (optional)" min="1888" max="2100">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Add to Seen</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Server Modal -->
  <div class="modal-overlay" id="server-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Server</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="server-form">
        <input type="hidden" id="server-id">
        <input type="hidden" id="server-type">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" id="server-name" placeholder="e.g., Home Plex" required>
        </div>
        <div class="form-group">
          <label class="form-label">URL</label>
          <input type="text" class="form-input" id="server-url" placeholder="http://localhost:32400" required>
        </div>
        <div class="form-group">
          <label class="form-label" id="server-key-label">Token</label>
          <input type="password" class="form-input" id="server-key" placeholder="Enter token or API key">
        </div>
        <label class="form-checkbox">
          <input type="checkbox" id="server-default">
          <span>Set as default</span>
        </label>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Data
    const INTEGRATIONS = [
      { key: 'tmdb', label: 'TMDB', fields: [{ name: 'tmdb_api_key', label: 'API Key', type: 'password' }] },
      { key: 'nzbgeek', label: 'NZBGeek', fields: [
        { name: 'nzbgeek_api_key', label: 'API Key', type: 'password' }
      ]},
      { key: 'drunkenslug', label: 'DrunkenSlug', fields: [
        { name: 'drunkenslug_api_key', label: 'API Key', type: 'password' }
      ]},
      { key: 'usenet', label: 'Usenet/NZBHydra', fields: [
        { name: 'usenet_base_url', label: 'Base URL', type: 'text' },
        { name: 'usenet_api_key', label: 'API Key', type: 'password' }
      ]}
    ];

    let settings = {};
    let servers = [];

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function getUserId() {
      let id = localStorage.getItem('majic_user_id');
      if (!id) { id = 'user-' + Math.random().toString(36).slice(2); localStorage.setItem('majic_user_id', id); }
      return id;
    }

    // Theme
    const theme = localStorage.getItem('majic_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-select').value = theme;
    document.getElementById('theme-select').onchange = e => {
      document.documentElement.setAttribute('data-theme', e.target.value);
      localStorage.setItem('majic_theme', e.target.value);
    };

    // Servers
    async function loadServers() {
      try {
        const res = await fetch('/api/servers');
        const data = await res.json();
        servers = data.ok ? data.servers : [];
        renderServers();
      } catch (e) { console.error(e); }
    }

    function renderServers() {
      const el = document.getElementById('servers-list');
      if (!servers.length) {
        el.innerHTML = '<div class="empty-state"><p>No servers configured</p></div>';
        return;
      }
      el.innerHTML = servers.map(s => `
        <div class="server-card ${s.is_default ? 'is-default' : ''}" data-id="${s.id}">
          <div class="server-icon">${s.service_type === 'plex' ? '📺' : '📥'}</div>
          <div class="server-info">
            <div class="server-name">
              ${esc(s.name)}
              ${s.is_default ? '<span class="default-star">★ Default</span>' : ''}
            </div>
            <div class="server-url">${esc(s.base_url)}</div>
          </div>
          <span class="server-status" data-server-status="${s.id}">Ready</span>
          <div class="server-actions">
            <button class="btn btn-secondary btn-sm" onclick="testServer(${s.id})">Test</button>
            <button class="btn btn-secondary btn-sm" onclick="editServer(${s.id})">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteServer(${s.id})">×</button>
          </div>
        </div>
      `).join('');
    }

    function openModal(type, id = null) {
      const modal = document.getElementById('server-modal');
      document.getElementById('server-type').value = type;
      document.getElementById('server-id').value = id || '';
      document.getElementById('modal-title').textContent = id ? `Edit ${type === 'plex' ? 'Plex' : 'Radarr'}` : `Add ${type === 'plex' ? 'Plex' : 'Radarr'}`;
      document.getElementById('server-key-label').textContent = type === 'plex' ? 'Token' : 'API Key';

      if (id) {
        const s = servers.find(x => x.id === id);
        if (s) {
          document.getElementById('server-name').value = s.name;
          document.getElementById('server-url').value = s.base_url;
          document.getElementById('server-key').value = '';
          document.getElementById('server-key').placeholder = 'Leave blank to keep current';
          document.getElementById('server-default').checked = s.is_default;
        }
      } else {
        document.getElementById('server-form').reset();
        document.getElementById('server-url').value = type === 'plex' ? 'http://localhost:32400' : 'http://localhost:7878';
      }
      modal.classList.add('open');
    }

    function closeModal() { document.getElementById('server-modal').classList.remove('open'); }

    function editServer(id) {
      const s = servers.find(x => x.id === id);
      if (s) openModal(s.service_type, id);
    }

    document.getElementById('server-form').onsubmit = async e => {
      e.preventDefault();
      const id = document.getElementById('server-id').value;
      const type = document.getElementById('server-type').value;
      const name = document.getElementById('server-name').value.trim();
      const url = document.getElementById('server-url').value.trim();
      const key = document.getElementById('server-key').value.trim();
      const isDefault = document.getElementById('server-default').checked;

      try {
        if (id) {
          const body = { name, base_url: url };
          if (key) body.api_key = key;
          await fetch(`/api/servers/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
          if (isDefault) await fetch(`/api/servers/${id}/default`, { method: 'POST' });
        } else {
          await fetch('/api/servers', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ service_type: type, name, base_url: url, api_key: key || null, is_default: isDefault })
          });
        }
        closeModal();
        loadServers();
      } catch (e) { alert('Error: ' + e.message); }
    };

    async function testServer(id) {
      const badge = document.querySelector(`[data-server-status="${id}"]`);
      if (badge) { badge.textContent = 'Testing...'; badge.className = 'server-status'; }
      try {
        const res = await fetch(`/api/servers/${id}/test`, { method: 'POST' });
        const data = await res.json();
        if (badge) {
          badge.textContent = data.ok ? 'Connected' : 'Failed';
          badge.className = `server-status ${data.ok ? 'connected' : 'error'}`;
        }
      } catch (e) {
        if (badge) { badge.textContent = 'Error'; badge.className = 'server-status error'; }
      }
    }

    async function deleteServer(id) {
      if (!confirm('Delete this server?')) return;
      await fetch(`/api/servers/${id}`, { method: 'DELETE' });
      loadServers();
    }

    // Settings
    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        settings = data.values || {};
        renderIntegrations();
        renderAISettings();
      } catch (e) { console.error(e); }
    }

    function renderIntegrations() {
      const el = document.getElementById('integration-list');
      el.innerHTML = INTEGRATIONS.map(int => `
        <div class="integration-item" data-key="${int.key}">
          <div class="integration-label">${esc(int.label)}</div>
          <div class="integration-fields">
            ${int.fields.map(f => `
              <input type="${f.type}" id="${f.name}" placeholder="${esc(f.label)}" value="${esc(settings[f.name] || '')}">
            `).join('')}
          </div>
          <button class="btn btn-secondary btn-sm" onclick="testIntegration('${int.key}')">Test</button>
        </div>
      `).join('');
    }

    function renderAISettings() {
      document.getElementById('groq_api_key').value = settings.groq_api_key || '';
      document.getElementById('groq_model').value = settings.groq_model || 'llama-3.3-70b-versatile';
      document.getElementById('ollama_base_url').value = settings.ollama_base_url || 'http://localhost:11434';

      if (settings.groq_api_key) {
        document.getElementById('groq-status').textContent = 'Configured';
        document.getElementById('groq-status').className = 'integration-status ok';
      }
      if (settings.ollama_base_url) {
        refreshOllamaModels();
      }

      // Provider toggle
      const activeProvider = settings.llm_provider || 'auto';
      document.querySelectorAll('#llm-provider-toggle .seg-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === activeProvider);
      });
      updateProviderHint(activeProvider);
    }

    function updateProviderHint(provider) {
      const hints = {
        auto: 'Groq if configured, otherwise Ollama',
        groq: 'Always use Groq Cloud (requires API key)',
        ollama: 'Always use local Ollama',
      };
      const el = document.getElementById('llm-provider-hint');
      if (el) el.textContent = hints[provider] || '';
    }

    document.querySelectorAll('#llm-provider-toggle .seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#llm-provider-toggle .seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateProviderHint(btn.dataset.value);
      });
    });

    async function refreshOllamaModels() {
      const select = document.getElementById('ollama_model');
      const status = document.getElementById('ollama-status');
      try {
        const res = await fetch('/api/ollama/models');
        const data = await res.json();
        if (data.ok && data.models?.length) {
          select.innerHTML = data.models.map(m =>
            `<option value="${esc(m.name)}" ${m.name === settings.ollama_model ? 'selected' : ''}>${esc(m.name)}</option>`
          ).join('');
          status.textContent = `${data.models.length} models`;
          status.className = 'integration-status ok';
        } else {
          select.innerHTML = '<option value="">No models found</option>';
          status.textContent = 'No models';
          status.className = 'integration-status';
        }
      } catch (e) {
        select.innerHTML = '<option value="">Connection failed</option>';
        status.textContent = 'Offline';
        status.className = 'integration-status error';
      }
    }

    async function testIntegration(key) {
      const values = {};
      INTEGRATIONS.find(i => i.key === key)?.fields.forEach(f => {
        values[f.name] = document.getElementById(f.name)?.value || '';
      });
      try {
        const res = await fetch('/api/integrations/test', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ integration: key, values })
        });
        const data = await res.json();
        showFeedback('integration-feedback', data.message || (data.ok ? 'Connected!' : 'Failed'), data.ok);
      } catch (e) {
        showFeedback('integration-feedback', 'Test failed: ' + e.message, false);
      }
    }

    document.getElementById('save-integrations').onclick = async () => {
      const payload = {};
      INTEGRATIONS.forEach(int => {
        int.fields.forEach(f => { payload[f.name] = document.getElementById(f.name)?.value?.trim() || ''; });
      });
      try {
        await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        showFeedback('integration-feedback', 'Settings saved!', true);
      } catch (e) {
        showFeedback('integration-feedback', 'Save failed', false);
      }
    };

    document.getElementById('save-ai').onclick = async () => {
      const activeProviderBtn = document.querySelector('#llm-provider-toggle .seg-btn.active');
      const payload = {
        groq_api_key: document.getElementById('groq_api_key').value.trim(),
        groq_model: document.getElementById('groq_model').value,
        ollama_base_url: document.getElementById('ollama_base_url').value.trim(),
        ollama_model: document.getElementById('ollama_model').value,
        llm_provider: activeProviderBtn ? activeProviderBtn.dataset.value : 'auto',
      };
      try {
        await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        settings = { ...settings, ...payload };
        renderAISettings();
      } catch (e) { alert('Save failed'); }
    };

    function showFeedback(id, msg, ok) {
      const el = document.getElementById(id);
      el.className = `feedback ${ok ? 'success' : 'error'}`;
      el.textContent = msg;
      setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
    }

    // Seen Movies
    async function loadSeenMovies() {
      const q = document.getElementById('seen-search').value.trim();
      try {
        const res = await fetch(`/api/seen/${getUserId()}?limit=200${q ? '&q=' + encodeURIComponent(q) : ''}`);
        const data = await res.json();
        const el = document.getElementById('seen-list');
        if (!data.length) {
          el.innerHTML = '<div class="empty-state"><p>No movies tracked yet</p></div>';
          return;
        }
        el.innerHTML = data.slice(0, 50).map(m => `
          <div class="seen-item">
            <div>
              <div class="seen-item-title">${esc(m.title)}</div>
              <div class="seen-item-meta">${m.year || ''} · ${m.source || 'manual'}</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="removeSeen('${esc(m.movie_id)}')">Remove</button>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function removeSeen(id) {
      await fetch('/api/seen', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ user_id: getUserId(), movie_id: id }) });
      loadSeenMovies();
    }

    document.getElementById('seen-search').oninput = () => {
      clearTimeout(window._searchTimer);
      window._searchTimer = setTimeout(loadSeenMovies, 250);
    };

    document.getElementById('import-plex').onclick = async () => {
      const btn = document.getElementById('import-plex');
      btn.disabled = true; btn.textContent = 'Importing...';
      try {
        const res = await fetch(`/api/seen/import/plex?user_id=${getUserId()}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) loadSeenMovies();
      } catch (e) { console.error(e); }
      btn.disabled = false; btn.textContent = 'Import from Plex';
    };

    document.getElementById('add-movie-form').onsubmit = async e => {
      e.preventDefault();
      const title = document.getElementById('movie-title').value.trim();
      const year = document.getElementById('movie-year').value;
      if (!title) return;
      await fetch('/api/seen', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          user_id: getUserId(),
          movie_id: `manual:${title.toLowerCase().replace(/\s+/g, '_')}:${year || 'na'}`,
          title, year: year ? parseInt(year) : null, source: 'manual'
        })
      });
      document.getElementById('add-movie-form').reset();
      loadSeenMovies();
    };

    // Init
    loadServers();
    loadSettings();
    loadSeenMovies();
  </script>
</body>
</html>

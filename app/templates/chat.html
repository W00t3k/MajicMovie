<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_title }} - AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v=20260321a" />
  <style>
    /* Map chat page vars to the shared theme system */
    :root, [data-theme] {
      --surface: var(--bg-card);
      --surface-2: var(--bg-hover);
      --text-dim: var(--text-muted);
      --accent: var(--primary);
      --accent-hover: var(--primary-hover);
      --green: var(--success);
      --yellow: var(--warning);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active { color: var(--text); }

    /* Chat Container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px;
      min-height: 0;
      overflow: hidden;
    }

    /* Provider Badge */
    .provider-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface-2);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .provider-badge.online { color: var(--green); }
    .provider-badge.offline { color: var(--text-dim); }

    .provider-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--accent);
      color: white;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .message-content {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-content {
      background: var(--surface-2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message-content p { margin-bottom: 8px; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }
    .message-content pre {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-content pre code {
      background: none;
      padding: 0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 20px;
      align-items: flex-end;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 24px;
      padding: 8px 0;
    }

    .chat-input:focus { outline: none; }
    .chat-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Welcome State */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      gap: 16px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 600;
    }

    .welcome p {
      color: var(--text-dim);
      max-width: 400px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .suggestion {
      padding: 10px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover {
      background: var(--border);
      border-color: var(--text-dim);
    }

    /* Movie Cards */
    .movie-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .movie-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 250px;
      flex: 1;
      max-width: 350px;
    }

    .movie-card-poster {
      width: 50px;
      height: 75px;
      background: var(--surface-2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .movie-card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }

    .movie-card-info {
      flex: 1;
      min-width: 0;
    }

    .movie-card-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-card-year {
      font-size: 12px;
      color: var(--text-dim);
    }

    .movie-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .movie-card-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .movie-card-btn.download {
      background: var(--accent);
      color: white;
    }

    .movie-card-btn.download:hover {
      background: var(--accent-hover);
    }

    .movie-card-btn.search {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .movie-card-btn.search:hover {
      background: var(--border);
    }

    .movie-card-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .movie-card-btn.success {
      background: var(--green);
      color: black;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .message { max-width: 90%; }
      .welcome { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">
      <img src="/static/logo.svg?v=20260219e" alt="Majic" />
      <span>{{ app_title }}</span>
    </a>
    <nav class="nav" style="display:flex;gap:20px;align-items:center;">
      <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;">Movies</a>
      <a href="/chat" style="color:var(--text);text-decoration:none;font-size:14px;font-weight:600;">AI Chat</a>
      <a href="/integrations" style="color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;">Settings</a>
      <select id="chat-theme-select" style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;" aria-label="Theme">
        <option value="dark">Dark</option>
        <option value="midnight">Midnight</option>
        <option value="ocean">Ocean</option>
        <option value="forest">Forest</option>
        <option value="sunset">Sunset</option>
        <option value="light">Light</option>
        <option value="aurora">Aurora</option>
        <option value="ember">Ember</option>
        <option value="slate">Slate</option>
        <option value="noir">Noir</option>
        <option value="cobalt">Cobalt</option>
        <option value="rose">Rose</option>
        <option value="ice">Ice</option>
        <option value="neon">Neon</option>
        <option value="vintage">Vintage</option>
        <option value="cinema">Cinema</option>
      </select>
    </nav>
  </header>

  <div class="chat-container">
    <div class="provider-bar">
      <div class="provider-badge" id="provider-status">
        <span class="provider-dot"></span>
        <span id="provider-name">Connecting...</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🎬</div>
        <h2>Movie AI Assistant</h2>
        <p>Ask me anything about movies, get recommendations, or just chat!</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Recommend a thriller</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Best movies of 2024</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Movies like Inception</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Oscar winners this year</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="chat-input" id="chat-input" placeholder="Ask about movies..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const providerStatus = document.getElementById('provider-status');
    const providerName = document.getElementById('provider-name');

    let isLoading = false;
    let conversationHistory = [];

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Enter to send
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Check provider status
    async function checkProvider() {
      try {
        const res = await fetch('/api/chat/status');
        const data = await res.json();

        if (data.available) {
          providerStatus.classList.add('online');
          providerStatus.classList.remove('offline');
          providerName.textContent = data.provider === 'groq' ? 'Groq' : data.provider === 'ollama' ? 'Ollama' : 'LLM';
        } else {
          providerStatus.classList.add('offline');
          providerStatus.classList.remove('online');
          providerName.textContent = 'Offline';
        }
      } catch {
        providerStatus.classList.add('offline');
        providerName.textContent = 'Offline';
      }
    }

    function sendSuggestion(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
    }

    function addMessage(role, content, movies = []) {
      if (welcomeEl) welcomeEl.style.display = 'none';

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? 'U' : 'AI';

      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.innerHTML = formatMessage(content);

      // Add movie cards if we have recommendations
      if (role === 'assistant' && movies.length > 0) {
        const cardsEl = document.createElement('div');
        cardsEl.className = 'movie-cards';
        movies.forEach(movie => {
          cardsEl.appendChild(createMovieCard(movie));
        });
        contentEl.appendChild(cardsEl);
      }

      msg.appendChild(avatar);
      msg.appendChild(contentEl);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return msg;
    }

    function createMovieCard(movie) {
      const card = document.createElement('div');
      card.className = 'movie-card';

      const poster = document.createElement('div');
      poster.className = 'movie-card-poster';
      if (movie.poster_url) {
        const img = document.createElement('img');
        img.src = movie.poster_url;
        img.alt = movie.title;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:inherit;';
        img.onerror = () => { poster.textContent = '🎬'; };
        poster.appendChild(img);
      } else {
        poster.textContent = '🎬';
      }

      const info = document.createElement('div');
      info.className = 'movie-card-info';

      const title = document.createElement('div');
      title.className = 'movie-card-title';
      title.textContent = movie.title;

      const year = document.createElement('div');
      year.className = 'movie-card-year';
      year.textContent = movie.year || '';

      const actions = document.createElement('div');
      actions.className = 'movie-card-actions';

      const dlBtn = document.createElement('button');
      dlBtn.className = 'movie-card-btn download';
      dlBtn.textContent = '+ Add';
      dlBtn.onclick = () => addToRadarr(movie, dlBtn);

      const searchBtn = document.createElement('button');
      searchBtn.className = 'movie-card-btn search';
      searchBtn.textContent = 'Search';
      searchBtn.onclick = () => searchMovie(movie);

      actions.appendChild(dlBtn);
      actions.appendChild(searchBtn);
      info.appendChild(title);
      info.appendChild(year);
      info.appendChild(actions);
      card.appendChild(poster);
      card.appendChild(info);

      return card;
    }

    async function addToRadarr(movie, btn) {
      btn.disabled = true;
      btn.textContent = 'Adding...';

      try {
        // Use the existing /api/download endpoint which handles TMDB lookup internally
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: movie.title,
            year: movie.year ? parseInt(movie.year) : null
          })
        });

        const data = await res.json();
        if (data.ok) {
          btn.textContent = data.status === 'exists' ? 'Exists' : 'Added!';
          btn.className = 'movie-card-btn success';
        } else {
          btn.textContent = data.message || 'Failed';
          setTimeout(() => {
            btn.textContent = '+ Add';
            btn.disabled = false;
          }, 2000);
        }
      } catch (err) {
        btn.textContent = 'Error';
        setTimeout(() => {
          btn.textContent = '+ Add';
          btn.disabled = false;
        }, 2000);
      }
    }

    function searchMovie(movie) {
      const query = `${movie.title} ${movie.year || ''}`.trim();
      window.open(`/?search=${encodeURIComponent(query)}`, '_blank');
    }

    function extractMovies(text) {
      const movies = [];
      // Match patterns like "Movie Title" (Year) or "Movie Title" (YYYY)
      const patterns = [
        /"([^"]+)"\s*\((\d{4})\)/g,
        /\"([^\"]+)\"\s*\((\d{4})\)/g,
        /「([^」]+)」\s*\((\d{4})\)/g,
      ];

      for (const pattern of patterns) {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const title = match[1].trim();
          const year = match[2];
          if (title.length > 1 && !movies.find(m => m.title === title)) {
            movies.push({ title, year });
          }
        }
      }

      // Also try to match "Title (Year)" without quotes
      const simplePattern = /([A-Z][^.!?\n]*?)\s*\((\d{4})\)/g;
      let match;
      while ((match = simplePattern.exec(text)) !== null) {
        const title = match[1].trim().replace(/^(like|such as|including|watch|see|try|check out|recommend)\s+/i, '');
        const year = match[2];
        if (title.length > 2 && title.length < 60 && !movies.find(m => m.title === title)) {
          movies.push({ title, year });
        }
      }

      return movies.slice(0, 6); // Max 6 movies
    }

    function formatMessage(text) {
      // Basic markdown-ish formatting
      return text
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'message assistant';
      msg.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const typing = document.createElement('div');
      typing.className = 'typing-indicator';
      typing.innerHTML = '<span></span><span></span><span></span>';

      msg.appendChild(avatar);
      msg.appendChild(typing);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: conversationHistory.slice(-10) // Last 10 messages for context
          })
        });

        const data = await res.json();
        hideTyping();

        if (data.response) {
          // Use backend TMDB-resolved movies; fall back to regex extraction
          const movies = (data.movies && data.movies.length > 0)
            ? data.movies
            : extractMovies(data.response);
          addMessage('assistant', data.response, movies);
          conversationHistory.push({ role: 'assistant', content: data.response });
        } else {
          addMessage('assistant', 'Sorry, I encountered an error. Please try again.');
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', 'Connection error. Please check your settings.');
      }

      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Initialize theme
    (function() {
      const saved = localStorage.getItem('majic_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const sel = document.getElementById('chat-theme-select');
      if (sel) {
        sel.value = saved;
        sel.addEventListener('change', () => {
          document.documentElement.setAttribute('data-theme', sel.value);
          localStorage.setItem('majic_theme', sel.value);
        });
      }
    })();

    checkProvider();
    inputEl.focus();
  </script>
</body>
</html>
